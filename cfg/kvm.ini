[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
;谷歌在国内可用的域名直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn
;国内游戏域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
;各大游戏平台下载域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
;即时通讯包括了 Telegram/WhatsApp/Line 等海外主流即时通讯软件域名
ruleset=💬 Telegram,https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/telegram.list,28800
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=💻 开发社区,[]GEOSITE,category-dev
ruleset=🍁 华为服务,[]GEOSITE,huawei
ruleset=💰 数字货币,[]GEOSITE,category-cryptocurrency 
;测速工具包括 SpeedTest 等主流测速工具域名
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest
ruleset=🎮 Steam,https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/steam.list,28800
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🎶 TikTok,[]GEOSITE,tiktok
;Emby 包括主流 Emby 服务相关域名
ruleset=🎥 Emby,[]GEOSITE,category-emby
ruleset=🎥 Emby,https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/Emby.list,28800
ruleset=🎻 Spotify,[]GEOSITE,spotify
ruleset=🌎 国外媒体,[]GEOSITE,category-entertainment
ruleset=🌎 国外媒体,[]GEOIP,twitter,no-resolve
ruleset=🌎 国外媒体,[]GEOIP,facebook,no-resolve
ruleset=🌏 国内媒体,[]GEOSITE,category-media-cn
ruleset=🛒 国外电商,[]GEOSITE,category-ecommerce
ruleset=🚀 手动选择,[]GEOSITE,gfw
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve
ruleset=🎥 流媒体,[]GEOSITE,category-entertainment
ruleset=🎥 流媒体,[]GEOIP,netflix,no-resolve
ruleset=🪂 cloudflare,[]GEOIP,cloudflare,no-resolve
ruleset=💏 ST直播,https://gh-proxy.com/https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/StripChat.list,28800
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🎯 全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消
;PT/BT 优化开启会使 80/443 以外端口的流量直连
ruleset=🔀 非标端口,clash-classic:https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Port_Direct.yaml,28800
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=🐟 漏网之鱼,[]FINAL

;设置规则标志位结束

;设置节点分组标志位
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🎯 全球直连`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=💬 Telegram`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`[]🎯 全球直连`.*
custom_proxy_group=🪂 cloudflare`select`[]🎯 全球直连`[]🚀 手动选择`.*
custom_proxy_group=💰 数字货币`select`[]🚀 手动选择`[]🎯 全球直连`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`.*
