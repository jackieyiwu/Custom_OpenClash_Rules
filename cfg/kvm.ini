custom_proxy_group=🤖 AI服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=🎥 流媒体`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=🎥 Emby`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎯 全球直连`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=🎻 Spotify`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎯 全球直连`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=🌎 国外媒体`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=🌏 国内媒体`select`[]🎯 全球直连`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=🛒 国外电商`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎯 全球直连`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=📢 谷歌FCM`select`[]🎯 全球直连`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=🇬 谷歌服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=🍎 苹果服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`[]🎯 全球直连`.*
custom_proxy_group=Ⓜ️ 微软服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`[]🎯 全球直连`.*
custom_proxy_group=🎮 Steam`select`[]🎯 全球直连`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`.*
custom_proxy_group=🚀 测速工具`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`[]🎯 全球直连`.*
custom_proxy_group=🔀 非标端口`select`[]🐟 漏网之鱼`[]🎯 全球直连
