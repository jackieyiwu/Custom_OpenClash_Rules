custom_proxy_group=🎲 myself`smart`(KVM|vps)`https://www.gstatic.com/generate\_204`300,,50
custom_proxy_group=🌐 free`smart`(free|cf)`https://www.gstatic.com/generate\_204`300,,50
custom_proxy_group=♻️ 自动选择`smart`.*`url-test`.*`https://www.gstatic.com/generate\_204`300,,50
custom_proxy_group=🎯 全球直连`select`[]DIRECT

;设置分组标志位

;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true
