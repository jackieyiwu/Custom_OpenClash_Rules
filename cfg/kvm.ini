custom_proxy_group=🍁 华为服务`select`[]🚀 手动选择`[]🎯 全球直连`[]🌐 free`.*
custom_proxy_group=🚀 GitHub`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎲 myself`[]🌐 free`[]🎯 全球直连`.*
